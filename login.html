<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เข้าสู่ระบบ | Emergency MedBox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0d6efd, #198754);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      border-radius: 26px;
      border: none;
      box-shadow: 0 15px 40px rgba(0,0,0,.2);
    }

    .form-control {
      border-radius: 16px;
      padding: 13px;
    }

    .btn-login {
      border-radius: 16px;
      padding: 13px;
      font-weight: 600;
    }
  </style>
</head>

<body>

<div class="container px-3">
  <div class="card login-card mx-auto">
    <div class="card-body p-4 p-md-5">

      <div class="text-center mb-4">
        <h4 class="fw-bold text-primary">เข้าสู่ระบบ</h4>
        <div class="text-muted">ระบบควบคุมเบิกจ่ายกล่องยาฉุกเฉินช่วยชีวิต</div>
        <div class="small text-muted">ห้องยา โรงพยาบาลปลวกแดง</div>
      </div>

      <form id="loginForm">

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" id="username" class="form-control" required autocomplete="username">
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-login">
          เข้าสู่ระบบ
        </button>

        <div class="text-center mt-3">
          <a href="register.html" class="text-decoration-none">ลงทะเบียนผู้ใช้งานใหม่</a>
        </div>

      </form>

    </div>
  </div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const data = {
    action: 'login',
    username: document.getElementById('username').value.trim(),
    password: document.getElementById('password').value
  };

  const formData = new FormData();
  formData.append('data', JSON.stringify(data));

  Swal.fire({
    title: 'กำลังเข้าสู่ระบบ',
    text: 'กรุณารอสักครู่',
    allowOutsideClick: false,
    didOpen: () => Swal.showLoading()
  });

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: formData
    });

    const result = await res.json();

    if (result.success) {
      setSession(result.token, result.user);

      Swal.fire({
        icon: 'success',
        title: 'เข้าสู่ระบบสำเร็จ',
        timer: 1200,
        showConfirmButton: false
      }).then(() => {
        window.location.href = 'dashboard.html';
      });

    } else {
      Swal.fire('เข้าสู่ระบบไม่สำเร็จ', result.message, 'error');
    }

  } catch (error) {
    console.error(error);
    Swal.fire('เชื่อมต่อไม่ได้', 'กรุณาตรวจสอบ API URL หรือ Deploy Apps Script', 'error');
  }
});
</script>

</body>
</html>
