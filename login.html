<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ | Emergency MedBox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d6efd, #198754);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            width: 100%;
            max-width: 450px;
            border: none;
            border-radius: 28px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, .25);
        }
        
        .system-icon {
            width: 76px;
            height: 76px;
            border-radius: 24px;
            background: linear-gradient(135deg, #0d6efd, #198754);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            margin: 0 auto 18px auto;
            color: white;
        }
        
        .form-control {
            border-radius: 16px;
            padding: 13px 15px;
        }
        
        .btn-login {
            border-radius: 16px;
            padding: 13px;
            font-weight: 700;
        }
        
        .small-muted {
            font-size: 0.9rem;
            color: #6c757d;
        }
    </style>
</head>

<body>

    <div class="container px-3">
        <div class="card login-card mx-auto">
            <div class="card-body p-4 p-md-5">

                <div class="text-center mb-4">
                    <div class="system-icon">💊</div>
                    <h4 class="fw-bold text-primary mb-1">เข้าสู่ระบบ</h4>
                    <div class="text-muted">ระบบควบคุมเบิกจ่ายกล่องยาฉุกเฉินช่วยชีวิต</div>
                    <div class="small-muted">กลุ่มงานเภสัชกรรมฯ โรงพยาบาลปลวกแดง</div>
                </div>

                <form id="loginForm" autocomplete="off">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" id="username" class="form-control" required placeholder="กรอก Username">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" id="password" class="form-control" required placeholder="กรอก Password">
                    </div>

                    <button type="submit" id="btnLogin" class="btn btn-primary w-100 btn-login">
          เข้าสู่ระบบ
        </button>

                    <div class="text-center mt-3">
                        <a href="register.html" class="text-decoration-none">
            ลงทะเบียนผู้ใช้งานใหม่
          </a>
                    </div>

                </form>

                <hr>

                <div class="text-center small-muted">
                    Emergency MedBox Management System
                </div>

            </div>
        </div>
    </div>

    <script src="assets/js/config.js?v=10"></script>
    <script src="assets/js/auth.js?v=10"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem(TOKEN_KEY);
            const user = localStorage.getItem(USER_KEY);

            if (token && user) {
                window.location.href = 'dashboard.html';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btnLogin = document.getElementById('btnLogin');

            if (!username || !password) {
                Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอก Username และ Password', 'warning');
                return;
            }

            const data = {
                action: 'login',
                username: username,
                password: password
            };

            const params = new URLSearchParams();
            params.append('data', JSON.stringify(data));

            btnLogin.disabled = true;
            btnLogin.innerText = 'กำลังเข้าสู่ระบบ...';

            Swal.fire({
                title: 'กำลังเข้าสู่ระบบ',
                text: 'กรุณารอสักครู่',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: params
                });

                const text = await response.text();

                let result;

                try {
                    result = JSON.parse(text);
                } catch (jsonError) {
                    console.error('Invalid JSON:', text);
                    throw new Error('API ไม่ได้ส่งข้อมูล JSON กลับมา');
                }

                if (result.success) {
                    setSession(result.token, result.user);

                    Swal.fire({
                        icon: 'success',
                        title: 'เข้าสู่ระบบสำเร็จ',
                        text: 'ยินดีต้อนรับ ' + result.user.fullname,
                        timer: 1200,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'dashboard.html';
                    });

                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'เข้าสู่ระบบไม่สำเร็จ',
                        text: result.message || 'Username หรือ Password ไม่ถูกต้อง'
                    });
                }

            } catch (error) {
                console.error(error);

                Swal.fire({
                    icon: 'error',
                    title: 'เชื่อมต่อไม่ได้',
                    text: 'กรุณาตรวจสอบ API URL, Internet หรือการ Deploy Apps Script'
                });

            } finally {
                btnLogin.disabled = false;
                btnLogin.innerText = 'เข้าสู่ระบบ';
            }
        });
    </script>

</body>

</html>
