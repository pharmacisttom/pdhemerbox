<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ทะเบียนยา | Emergency MedBox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Sarabun', sans-serif;
      background: #eef7f5;
    }

    .topbar {
      background: linear-gradient(135deg, #0d6efd, #198754);
      color: white;
      padding: 24px;
      border-radius: 0 0 28px 28px;
    }

    .card-custom {
      border: none;
      border-radius: 22px;
      box-shadow: 0 8px 25px rgba(0,0,0,.08);
    }

    .form-control,
    .form-select {
      border-radius: 14px;
      padding: 12px;
    }

    .btn-main {
      border-radius: 16px;
      padding: 10px 18px;
      font-weight: 600;
    }

    .badge {
      border-radius: 20px;
      padding: 8px 12px;
    }
  </style>
</head>

<body>

<div class="topbar mb-4">
  <div class="container d-flex justify-content-between align-items-center">
    <div>
      <h4 class="fw-bold mb-1">ทะเบียนยาในระบบกล่องยาฉุกเฉิน</h4>
      <div>ห้องยา โรงพยาบาลปลวกแดง</div>
    </div>

    <div>
      <a href="dashboard.html" class="btn btn-light rounded-pill">กลับหน้าหลัก</a>
    </div>
  </div>
</div>

<div class="container mb-5">

  <div class="card card-custom mb-4">
    <div class="card-body p-4">

      <h5 class="fw-bold text-primary mb-3">เพิ่ม / แก้ไข รายการยา</h5>

      <form id="medicineForm">

        <input type="hidden" id="medicine_id">

        <div class="row g-3">

          <div class="col-md-6">
            <label class="form-label">ชื่อยา</label>
            <input type="text" id="medicine_name" class="form-control" placeholder="เช่น Adrenaline" required>
          </div>

          <div class="col-md-3">
            <label class="form-label">ความแรง</label>
            <input type="text" id="strength" class="form-control" placeholder="เช่น 1 mg/ml" required>
          </div>

          <div class="col-md-3">
            <label class="form-label">รูปแบบยา</label>
            <input type="text" id="dosage_form" class="form-control" placeholder="เช่น ampoule, vial" required>
          </div>

          <div class="col-md-3">
            <label class="form-label">หน่วยนับ</label>
            <input type="text" id="unit" class="form-control" placeholder="เช่น amp, vial, tab" required>
          </div>

          <div class="col-md-3">
            <label class="form-label">สถานะยา</label>
            <select id="status" class="form-select" required>
              <option value="active">active</option>
              <option value="inactive">inactive</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">การเก็บรักษา</label>
            <input type="text" id="storage_condition" class="form-control" placeholder="เช่น Room temperature, 2-8°C">
          </div>

          <div class="col-12">
            <label class="form-label">วิธีผสมยา / วิธีเตรียมยา</label>
            <textarea id="mix_instruction" class="form-control" rows="3" placeholder="ระบุวิธีผสมยา ความเข้มข้นหลังผสม สารน้ำที่เข้ากันได้ และข้อควรระวัง"></textarea>
          </div>

          <div class="col-12">
            <label class="form-label">คำเตือน / ข้อควรระวัง</label>
            <textarea id="warning" class="form-control" rows="2" placeholder="เช่น High Alert Drug, LASA, ระวัง extravasation, monitor ECG"></textarea>
          </div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-success btn-main">
              บันทึกข้อมูลยา
            </button>

            <button type="button" class="btn btn-secondary btn-main" onclick="resetForm()">
              ล้างฟอร์ม
            </button>
          </div>

        </div>

      </form>

    </div>
  </div>

  <div class="card card-custom">
    <div class="card-body p-4">

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold text-primary mb-0">รายการทะเบียนยา</h5>
        <button class="btn btn-outline-primary rounded-pill" onclick="loadMedicines()">รีเฟรช</button>
      </div>

      <div class="table-responsive">
        <table id="medicineTable" class="table table-hover align-middle w-100">
          <thead class="table-primary">
            <tr>
              <th>รหัสยา</th>
              <th>ชื่อยา</th>
              <th>ความแรง</th>
              <th>รูปแบบ</th>
              <th>หน่วย</th>
              <th>คำเตือน</th>
              <th>สถานะ</th>
              <th width="150">จัดการ</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

    </div>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.min.js"></script>

<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>

<script>
requireLogin();
requireRole(['admin', 'box_manager']);

const user = getUser();
let medicines = [];
let dataTable = null;

document.addEventListener('DOMContentLoaded', function() {
  loadMedicines();
});

async function loadMedicines(showLoader = true) {
  try {
    if (showLoader) {
      Swal.fire({
        title: 'กำลังโหลดข้อมูล',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
      });
    }

    const res = await fetch(API_URL + '?action=getMedicines&token=' + encodeURIComponent(getToken()));
    const result = await res.json();

    if (showLoader) Swal.close();

    if (!result.success) {
      Swal.fire('ผิดพลาด', result.message, 'error');
      return;
    }

    medicines = result.medicines || [];
    renderTable();

  } catch (error) {
    Swal.fire('โหลดข้อมูลไม่สำเร็จ', 'กรุณาตรวจสอบ API', 'error');
  }
}

function renderTable() {
  const tbody = document.querySelector('#medicineTable tbody');
  tbody.innerHTML = '';

  medicines.forEach(m => {
    tbody.innerHTML += `
      <tr>
        <td>${escapeHtml(m.medicine_id)}</td>
        <td>${escapeHtml(m.medicine_name)}</td>
        <td>${escapeHtml(m.strength)}</td>
        <td>${escapeHtml(m.dosage_form)}</td>
        <td>${escapeHtml(m.unit)}</td>
        <td>${escapeHtml(m.warning)}</td>
        <td>${statusBadge(m.status)}</td>
        <td>
          <button class="btn btn-sm btn-warning" onclick="editMedicine('${escapeAttr(m.medicine_id)}')">แก้ไข</button>
          <button class="btn btn-sm btn-danger" onclick="deleteMedicine('${escapeAttr(m.medicine_id)}')">ลบ</button>
        </td>
      </tr>
    `;
  });

  if (dataTable) {
    dataTable.destroy();
  }

  dataTable = new DataTable('#medicineTable', {
    language: {
      search: 'ค้นหา:',
      lengthMenu: 'แสดง _MENU_ รายการ',
      info: 'แสดง _START_ ถึง _END_ จาก _TOTAL_ รายการ',
      paginate: {
        first: 'แรก',
        last: 'สุดท้าย',
        next: 'ถัดไป',
        previous: 'ก่อนหน้า'
      },
      zeroRecords: 'ไม่พบข้อมูล'
    },
    responsive: true
  });
}

document.getElementById('medicineForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const data = {
    action: 'saveMedicine',
    token: getToken(),
    user: user,
    medicine_id: document.getElementById('medicine_id').value.trim(),
    medicine_name: document.getElementById('medicine_name').value.trim(),
    strength: document.getElementById('strength').value.trim(),
    dosage_form: document.getElementById('dosage_form').value.trim(),
    unit: document.getElementById('unit').value.trim(),
    storage_condition: document.getElementById('storage_condition').value.trim(),
    mix_instruction: document.getElementById('mix_instruction').value.trim(),
    warning: document.getElementById('warning').value.trim(),
    status: document.getElementById('status').value
  };

  Swal.fire({
    title: 'กำลังบันทึกข้อมูล',
    allowOutsideClick: false,
    didOpen: () => Swal.showLoading()
  });

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.success) {
      resetForm();
      await loadMedicines(false);
      Swal.fire({ icon:'success', title:'บันทึกแล้ว', text:result.message, timer:1200, showConfirmButton:false });
    } else {
      Swal.fire('ไม่สำเร็จ', result.message, 'error');
    }

  } catch (error) {
    Swal.fire('เชื่อมต่อไม่ได้', 'กรุณาตรวจสอบ API', 'error');
  }
});

function editMedicine(medicineId) {
  const m = medicines.find(x => x.medicine_id === medicineId);

  if (!m) {
    Swal.fire('ไม่พบข้อมูล', 'ไม่พบรายการยาที่ต้องการแก้ไข', 'warning');
    return;
  }

  document.getElementById('medicine_id').value = m.medicine_id || '';
  document.getElementById('medicine_name').value = m.medicine_name || '';
  document.getElementById('strength').value = m.strength || '';
  document.getElementById('dosage_form').value = m.dosage_form || '';
  document.getElementById('unit').value = m.unit || '';
  document.getElementById('storage_condition').value = m.storage_condition || '';
  document.getElementById('mix_instruction').value = m.mix_instruction || '';
  document.getElementById('warning').value = m.warning || '';
  document.getElementById('status').value = m.status || 'active';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function deleteMedicine(medicineId) {
  const confirm = await Swal.fire({
    icon: 'warning',
    title: 'ยืนยันการลบ',
    text: 'ต้องการปิดใช้งานรายการยานี้ใช่หรือไม่',
    showCancelButton: true,
    confirmButtonText: 'ยืนยัน',
    cancelButtonText: 'ยกเลิก'
  });

  if (!confirm.isConfirmed) return;

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'deleteMedicine',
        token: getToken(),
        user: user,
        medicine_id: medicineId
      })
    });

    const result = await res.json();

    if (result.success) {
      await loadMedicines(false);
      Swal.fire({ icon:'success', title:'อัปเดตแล้ว', text:result.message, timer:1200, showConfirmButton:false });
    } else {
      Swal.fire('ไม่สำเร็จ', result.message, 'error');
    }

  } catch (error) {
    Swal.fire('เชื่อมต่อไม่ได้', 'กรุณาตรวจสอบ API', 'error');
  }
}

function resetForm() {
  document.getElementById('medicineForm').reset();
  document.getElementById('medicine_id').value = '';
  document.getElementById('status').value = 'active';
}

function statusBadge(status) {
  if (status === 'active') {
    return '<span class="badge bg-success">active</span>';
  }

  return '<span class="badge bg-secondary">inactive</span>';
}

function escapeHtml(text) {
  if (!text) return '';

  return String(text)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function escapeAttr(text) {
  return escapeHtml(text).replaceAll('`', '&#096;');
}
</script>

</body>
</html>
