```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Replenishment Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{
    background:#eef5f4;
}

.header{
    background:linear-gradient(135deg,#0d6efd,#198754);
    color:#fff;
    padding:25px;
    border-radius:0 0 25px 25px;
}

.card-custom{
    border:none;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}
</style>
</head>

<body>

<div class="header">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h3>ระบบเติมคืนกล่องยา (Replenishment)</h3>
                <small>Emergency Drug Box Control System</small>
            </div>

            <a href="dashboard.html" class="btn btn-light">
                กลับหน้าหลัก
            </a>
        </div>
    </div>
</div>

<div class="container mt-4">

<div class="card card-custom">
<div class="card-body">

<h5 class="mb-3">รายการเติมคืนกล่องยา</h5>

<div class="table-responsive">

<table class="table table-bordered table-hover align-middle">

<thead class="table-primary">
<tr>
<th>เลขที่</th>
<th>Request</th>
<th>ยา</th>
<th>กล่องยา</th>
<th>ใช้ไป</th>
<th>ต้องเติม</th>
<th>สถานะ</th>
<th width="220">ดำเนินการ</th>
</tr>
</thead>

<tbody id="tblReplenishment">

<tr>
<td colspan="8" class="text-center">
กำลังโหลดข้อมูล...
</td>
</tr>

</tbody>

</table>

</div>

</div>
</div>

</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>

<script>

requireLogin();

loadData();

async function loadData(){

try{

const token = localStorage.getItem("token");

const res = await fetch(
API_URL +
'?action=getReplenishments&token=' +
encodeURIComponent(token)
);

const result = await res.json();

if(!result.success){
    throw new Error(result.message);
}

renderTable(result.replenishments);

}catch(err){

Swal.fire({
icon:'error',
title:'โหลดข้อมูลไม่สำเร็จ',
text:err.message
});

}

}

function renderTable(data){

const tbody =
document.getElementById("tblReplenishment");

tbody.innerHTML='';

if(data.length===0){

tbody.innerHTML=
`
<tr>
<td colspan="8" class="text-center">
ไม่พบข้อมูล
</td>
</tr>
`;

return;
}

data.forEach(item=>{

let badge='secondary';

if(item.status==='pending')
badge='warning';

if(item.status==='approved')
badge='info';

if(item.status==='completed')
badge='success';

if(item.status==='cancelled')
badge='danger';

tbody.innerHTML+=`
<tr>

<td>${item.replenish_id}</td>

<td>${item.request_id}</td>

<td>${item.medicine_id}</td>

<td>${item.box_code}</td>

<td>${item.qty_used}</td>

<td>${item.qty_required}</td>

<td>
<span class="badge bg-${badge}">
${item.status}
</span>
</td>

<td>

<button
class="btn btn-sm btn-primary"
onclick="updateStatus(
'${item.replenish_id}',
'approved'
)">
อนุมัติ
</button>

<button
class="btn btn-sm btn-success"
onclick="updateStatus(
'${item.replenish_id}',
'completed'
)">
เติมคืนแล้ว
</button>

<button
class="btn btn-sm btn-danger"
onclick="updateStatus(
'${item.replenish_id}',
'cancelled'
)">
ยกเลิก
</button>

</td>

</tr>
`;
});

}

async function updateStatus(id,status){

const confirm =
await Swal.fire({
title:'ยืนยันการทำรายการ?',
text:'เปลี่ยนสถานะเป็น ' + status,
icon:'question',
showCancelButton:true,
confirmButtonText:'ยืนยัน'
});

if(!confirm.isConfirmed) return;

try{

const token =
localStorage.getItem("token");

const user =
JSON.parse(
localStorage.getItem("user")
);

const payload = {

action:'updateReplenishmentStatus',
token:token,
user:user,
replenish_id:id,
status:status

};

const res = await fetch(API_URL,{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify(payload)

});

const result =
await res.json();

if(result.success){

Swal.fire({
icon:'success',
title:'สำเร็จ',
text:result.message
});

loadData();

}else{

throw new Error(result.message);

}

}catch(err){

Swal.fire({
icon:'error',
title:'ผิดพลาด',
text:err.message
});

}

}

</script>

</body>
</html>
```
