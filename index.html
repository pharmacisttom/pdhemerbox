<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Emergency MedBox | โรงพยาบาลปลวกแดง</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Sarabun',sans-serif;
    background:linear-gradient(135deg,#0d6efd,#198754);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.card-main{
    border:none;
    border-radius:30px;
    max-width:650px;
    width:100%;
    box-shadow:0 15px 40px rgba(0,0,0,.20);
}

.logo{
    width:120px;
    height:120px;
    object-fit:contain;
}

.loading{
    width:50px;
    height:50px;
    border:5px solid #e9ecef;
    border-top:5px solid #0d6efd;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.version{
    font-size:12px;
    color:#6c757d;
}

</style>

</head>

<body>

<div class="card card-main">

    <div class="card-body p-5 text-center">

        <img
            src="https://cdn-icons-png.flaticon.com/512/2966/2966486.png"
            class="logo mb-4"
            alt="Emergency MedBox">

        <h2 class="fw-bold text-primary">
            Emergency MedBox
        </h2>

        <h5 class="text-success">
            ระบบควบคุมการเบิกจ่ายกล่องยาฉุกเฉินช่วยชีวิต
        </h5>

        <p class="text-muted mb-1">
            ห้องยา โรงพยาบาลปลวกแดง
        </p>

        <p class="text-muted mb-4">
            Emergency Drug Box Management System
        </p>

        <div class="loading mb-3"></div>

        <div id="statusText" class="fw-bold">
            กำลังตรวจสอบการเข้าสู่ระบบ...
        </div>

        <hr>

        <div class="version">
            Version 1.0.0
        </div>

    </div>

</div>

<script>

const TOKEN_KEY = 'medbox_token';
const USER_KEY = 'medbox_user';
const PRIVACY_CONSENT_KEY = 'medbox_privacy_consent_v1';

function hasPrivacyConsent(){
    try{
        const consent = JSON.parse(localStorage.getItem(PRIVACY_CONSENT_KEY));
        return Boolean(consent && consent.accepted === true && consent.version === 1);
    }catch(e){
        return false;
    }
}

function checkSession(){

    const token = localStorage.getItem(TOKEN_KEY);
    const user = localStorage.getItem(USER_KEY);

    if(!hasPrivacyConsent()){

        document.getElementById('statusText').innerHTML =
        'กรุณารับทราบประกาศ PDPA/คุกกี้ก่อนใช้งานระบบ กำลังไปหน้า Login...';

        setTimeout(() => {

            window.location.href = 'login.html';

        },1500);

    }else if(token && user){

        document.getElementById('statusText').innerHTML =
        'พบข้อมูลผู้ใช้งาน กำลังเข้าสู่ระบบ...';

        setTimeout(() => {

            window.location.href = 'dashboard.html';

        },1500);

    }else{

        document.getElementById('statusText').innerHTML =
        'ยังไม่ได้เข้าสู่ระบบ กำลังไปหน้า Login...';

        setTimeout(() => {

            window.location.href = 'login.html';

        },1500);

    }

}

window.onload = checkSession;

</script>

</body>
</html>
