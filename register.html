<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ลงทะเบียน | Emergency MedBox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Sarabun', sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #e8f5e9);
      min-height: 100vh;
    }

    .card-custom {
      border: none;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.1);
    }

    .form-control, .form-select {
      border-radius: 14px;
      padding: 12px;
    }

    .btn-main {
      border-radius: 16px;
      padding: 12px;
      font-weight: 600;
    }

    .privacy-note {
      background: #f8fafc;
      border: 1px solid #dbe4ef;
      border-radius: 16px;
      color: #475569;
      font-size: .92rem;
      padding: 12px 14px;
    }
  </style>
</head>

<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">

      <div class="card card-custom">
        <div class="card-body p-4 p-md-5">

          <h4 class="fw-bold text-primary text-center mb-1">ลงทะเบียนผู้ใช้งาน</h4>
          <div class="text-center text-muted mb-4">ระบบกล่องยาฉุกเฉินช่วยชีวิต</div>

          <form id="registerForm">

            <div class="privacy-note mb-3">
              ก่อนลงทะเบียน ระบบจะแจ้งการใช้ข้อมูลส่วนบุคคลและข้อมูลบนอุปกรณ์ตามวัตถุประสงค์ของงานกล่องยาฉุกเฉิน
              <button type="button" class="btn btn-link p-0 align-baseline" onclick="showPrivacyNotice()">อ่านประกาศ PDPA/คุกกี้</button>
            </div>

            <div class="mb-3">
              <label class="form-label">ชื่อ-สกุล</label>
              <input type="text" id="fullname" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" id="username" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" id="password" class="form-control" required minlength="6">
            </div>

            <div class="mb-3">
              <label class="form-label">หน่วยงาน</label>
              <select id="department" class="form-select" required>
                <option value="">-- เลือกหน่วยงาน --</option>
                <option value="ER">ER</option>
                <option value="OPD">OPD</option>
                <option value="IPD">IPD</option>
                <option value="LR">LR</option>
                <option value="OR">OR</option>
                <option value="ICU">ICU</option>
                <option value="Pharmacy">Pharmacy</option>
                <option value="IT">IT</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">ระดับสิทธิ์</label>
              <select id="role" class="form-select" required>
                <option value="">-- เลือกระดับสิทธิ์ --</option>
                <option value="requester">ผู้เบิกกล่องยา</option>
                <option value="box_dispenser">ผู้จ่ายกล่องยา</option>
                <option value="box_manager">ผู้จัดกล่องยา</option>
                <option value="admin">แอดมินระบบ</option>
              </select>
            </div>

            <button type="submit" class="btn btn-success w-100 btn-main">
              ลงทะเบียน
            </button>

            <div class="text-center mt-3">
              <a href="login.html" class="text-decoration-none">กลับไปหน้าเข้าสู่ระบบ</a>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  ensurePrivacyConsent({
    redirectOnReject: true
  });
});

document.getElementById('registerForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const accepted = await ensurePrivacyConsent({
    redirectOnReject: true
  });

  if (!accepted) {
    return;
  }

  const data = {
    action: 'register',
    fullname: document.getElementById('fullname').value.trim(),
    username: document.getElementById('username').value.trim(),
    password: document.getElementById('password').value,
    department: document.getElementById('department').value,
    role: document.getElementById('role').value
  };

  Swal.fire({
    title: 'กำลังลงทะเบียน',
    allowOutsideClick: false,
    didOpen: () => Swal.showLoading()
  });

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.success) {
      Swal.fire({
        icon: 'success',
        title: 'ลงทะเบียนสำเร็จ',
        text: 'กรุณารอผู้ดูแลระบบเปิดใช้งานบัญชี'
      }).then(() => {
        window.location.href = 'login.html';
      });
    } else {
      Swal.fire('ลงทะเบียนไม่สำเร็จ', result.message, 'error');
    }

  } catch (error) {
    Swal.fire('เชื่อมต่อไม่ได้', 'กรุณาตรวจสอบ Internet หรือ API URL', 'error');
  }
});
</script>

</body>
</html>
