<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Stock Lot ยา | Emergency MedBox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Sarabun', sans-serif; background:#eef7f5; }
    .topbar {
      background: linear-gradient(135deg,#0d6efd,#198754);
      color:#fff; padding:24px; border-radius:0 0 28px 28px;
    }
    .card-custom {
      border:none; border-radius:22px; box-shadow:0 8px 25px rgba(0,0,0,.08);
    }
    .form-control,.form-select { border-radius:14px; padding:12px; }
    .btn-main { border-radius:16px; padding:10px 18px; font-weight:600; }
    .badge { border-radius:20px; padding:8px 12px; }
  </style>
</head>

<body>

<div class="topbar mb-4">
  <div class="container d-flex justify-content-between align-items-center">
    <div>
      <h4 class="fw-bold mb-1">จัดการ Lot ยา / วันผลิต / วันหมดอายุ</h4>
      <div>ระบบควบคุมกล่องยาฉุกเฉินช่วยชีวิต</div>
    </div>
    <a href="dashboard.html" class="btn btn-light rounded-pill">กลับหน้าหลัก</a>
  </div>
</div>

<div class="container mb-5">

  <div class="card card-custom mb-4">
    <div class="card-body p-4">
      <h5 class="fw-bold text-primary mb-3">เพิ่ม / แก้ไข Lot ยา</h5>

      <form id="lotForm">
        <input type="hidden" id="lot_id">

        <div class="row g-3">

          <div class="col-md-4">
            <label class="form-label">รายการยา</label>
            <select id="medicine_id" class="form-select" required></select>
          </div>

          <div class="col-md-3">
            <label class="form-label">Lot No.</label>
            <input type="text" id="lot_no" class="form-control" required>
          </div>

          <div class="col-md-2">
            <label class="form-label">วันผลิต</label>
            <input type="date" id="mfg_date" class="form-control">
          </div>

          <div class="col-md-3">
            <label class="form-label">วันหมดอายุ</label>
            <input type="date" id="exp_date" class="form-control" required>
          </div>

          <div class="col-md-2">
            <label class="form-label">จำนวนรับเข้า</label>
            <input type="number" id="receive_qty" class="form-control" min="0" required>
          </div>

          <div class="col-md-2">
            <label class="form-label">คงเหลือ</label>
            <input type="number" id="current_qty" class="form-control" min="0" required>
          </div>

          <div class="col-md-2">
            <label class="form-label">หน่วย</label>
            <input type="text" id="unit" class="form-control" readonly>
          </div>

          <div class="col-md-3">
            <label class="form-label">Location / หน่วยงาน</label>
            <select id="location" class="form-select" required></select>
          </div>

          <div class="col-md-3">
            <label class="form-label">รหัสกล่องยา</label>
            <select id="box_code" class="form-select" required>
              <option value="">-- เลือกกล่องยาตามหน่วยงาน --</option>
            </select>
          </div>

          <div class="col-md-3">
            <label class="form-label">สถานะ</label>
            <select id="status" class="form-select">
              <option value="active">active</option>
              <option value="inactive">inactive</option>
              <option value="expired">expired</option>
              <option value="used_out">used_out</option>
            </select>
          </div>

          <div class="col-12">
            <label class="form-label">หมายเหตุ</label>
            <textarea id="note" class="form-control" rows="2"></textarea>
          </div>

          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-success btn-main">บันทึก Lot ยา</button>
            <button type="button" class="btn btn-secondary btn-main" onclick="resetForm()">ล้างฟอร์ม</button>
          </div>

        </div>
      </form>
    </div>
  </div>

  <div class="card card-custom">
    <div class="card-body p-4">

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold text-primary mb-0">รายการ Stock Lot</h5>
        <button class="btn btn-outline-primary rounded-pill" onclick="loadLots()">รีเฟรช</button>
      </div>

      <div class="table-responsive">
        <table id="lotsTable" class="table table-hover align-middle w-100">
          <thead class="table-primary">
            <tr>
              <th>Lot ID</th>
              <th>ยา</th>
              <th>Lot No.</th>
              <th>วันผลิต</th>
              <th>หมดอายุ</th>
              <th>รับเข้า</th>
              <th>คงเหลือ</th>
              <th>หน่วย</th>
              <th>กล่องยา</th>
              <th>สถานะ</th>
              <th width="150">จัดการ</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

    </div>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.min.js"></script>

<script src="assets/js/config.js?v=10"></script>
<script src="assets/js/auth.js?v=10"></script>

<script>
requireLogin();
requireRole(['admin', 'box_manager', 'box_dispenser']);

const user = getUser();
let medicines = [];
let departments = [];
let departmentBoxes = [];
let boxItems = [];
let lots = [];
let dataTable = null;

document.addEventListener('DOMContentLoaded', loadLots);

async function loadLots() {
  try {
    Swal.fire({ title:'กำลังโหลดข้อมูล', allowOutsideClick:false, didOpen:()=>Swal.showLoading() });

    const res = await fetch(API_URL + '?action=getStockLots&token=' + encodeURIComponent(getToken()));
    const result = await res.json();

    Swal.close();

    if (!result.success) {
      Swal.fire('ผิดพลาด', result.message, 'error');
      return;
    }

    medicines = result.medicines || [];
    departments = result.departments || [];
    lots = result.lots || [];

    const setupRes = await fetch(API_URL + '?action=getBoxSetupData&token=' + encodeURIComponent(getToken()));
    const setupResult = await setupRes.json();

    if (!setupResult.success) {
      Swal.fire('ผิดพลาด', setupResult.message, 'error');
      return;
    }

    departmentBoxes = setupResult.department_boxes || [];
    boxItems = setupResult.box_items || [];

    renderSelects();
    renderTable();

  } catch (error) {
    console.error(error);
    Swal.fire('โหลดข้อมูลไม่สำเร็จ', 'กรุณาตรวจสอบ API', 'error');
  }
}

function renderSelects() {
  renderMedicineSelect();

  const locSelect = document.getElementById('location');
  locSelect.innerHTML = '<option value="">-- เลือกหน่วยงาน --</option>';

  departments
    .filter(d => d.status === 'active')
    .forEach(d => {
      locSelect.innerHTML += `
        <option value="${escapeHtml(d.department_name)}" data-department-id="${escapeHtml(d.department_id)}">
          ${escapeHtml(d.department_name)}
        </option>
      `;
    });

  renderBoxSelect();
}

document.getElementById('location').addEventListener('change', function() {
  renderBoxSelect();
  renderMedicineSelect();
});

function renderBoxSelect(selectedValue = '') {
  const select = document.getElementById('box_code');
  const currentValue = selectedValue || select.value;
  const departmentId = getSelectedDepartmentId();

  select.innerHTML = '<option value="">-- เลือกกล่องยาตามหน่วยงาน --</option>';

  departmentBoxes
    .filter(box => box.status === 'active')
    .filter(box => !departmentId || sameId(box.department_id, departmentId))
    .forEach(box => {
      select.innerHTML += `
        <option value="${escapeHtml(box.box_code)}">
          ${escapeHtml(box.box_code)} - ${escapeHtml(box.box_name || 'กล่องยา')}
        </option>
      `;
    });

  if (currentValue && Array.from(select.options).some(option => option.value === currentValue)) {
    select.value = currentValue;
  }
}

document.getElementById('box_code').addEventListener('change', function() {
  renderMedicineSelect();
});

function renderMedicineSelect(selectedValue = '') {
  const medSelect = document.getElementById('medicine_id');
  const currentValue = selectedValue || medSelect.value;
  const selectedBox = getSelectedBox();
  const allowedMedicineIds = selectedBox ?
    boxItems
      .filter(item => item.status === 'active' && sameId(item.box_type_id, selectedBox.box_type_id))
      .map(item => String(item.medicine_id)) :
    [];

  medSelect.innerHTML = '<option value="">-- เลือกรายการยา --</option>';

  medicines
    .filter(m => m.status === 'active')
    .filter(m => !selectedBox || allowedMedicineIds.includes(String(m.medicine_id)))
    .forEach(m => {
      medSelect.innerHTML += `
        <option value="${escapeHtml(m.medicine_id)}" data-unit="${escapeHtml(m.unit)}">
          ${escapeHtml(m.medicine_name)} ${escapeHtml(m.strength)}
        </option>
      `;
    });

  if (currentValue && Array.from(medSelect.options).some(option => option.value === currentValue)) {
    medSelect.value = currentValue;
  } else {
    document.getElementById('unit').value = '';
  }
}

document.getElementById('medicine_id').addEventListener('change', function() {
  const selected = this.options[this.selectedIndex];
  document.getElementById('unit').value = selected.getAttribute('data-unit') || '';
});

document.getElementById('receive_qty').addEventListener('input', function() {
  const lotId = document.getElementById('lot_id').value;
  if (!lotId) {
    document.getElementById('current_qty').value = this.value;
  }
});

document.getElementById('lotForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const data = {
    action: 'saveStockLot',
    token: getToken(),
    user: user,
    lot_id: document.getElementById('lot_id').value.trim(),
    medicine_id: document.getElementById('medicine_id').value,
    lot_no: document.getElementById('lot_no').value.trim(),
    mfg_date: document.getElementById('mfg_date').value,
    exp_date: document.getElementById('exp_date').value,
    receive_qty: document.getElementById('receive_qty').value,
    current_qty: document.getElementById('current_qty').value,
    unit: document.getElementById('unit').value,
    location: document.getElementById('location').value,
    box_code: document.getElementById('box_code').value,
    status: document.getElementById('status').value,
    note: document.getElementById('note').value.trim()
  };

  const params = new URLSearchParams();
  params.append('data', JSON.stringify(data));

  try {
    Swal.fire({ title:'กำลังบันทึกข้อมูล', allowOutsideClick:false, didOpen:()=>Swal.showLoading() });

    const res = await fetch(API_URL, { method:'POST', body:params });
    const result = await res.json();

    if (result.success) {
      Swal.fire('สำเร็จ', result.message, 'success');
      resetForm();
      loadLots();
    } else {
      Swal.fire('ไม่สำเร็จ', result.message, 'error');
    }

  } catch (error) {
    console.error(error);
    Swal.fire('เชื่อมต่อไม่ได้', 'กรุณาตรวจสอบ API', 'error');
  }
});

function renderTable() {
  const tbody = document.querySelector('#lotsTable tbody');
  tbody.innerHTML = '';

  lots.forEach(l => {
    tbody.innerHTML += `
      <tr>
        <td>${escapeHtml(l.lot_id)}</td>
        <td>${escapeHtml(getMedicineName(l.medicine_id))}</td>
        <td>${escapeHtml(l.lot_no)}</td>
        <td>${escapeHtml(l.mfg_date)}</td>
        <td>${expBadge(l.exp_date)}</td>
        <td>${escapeHtml(l.receive_qty)}</td>
        <td>${qtyBadge(l.current_qty)}</td>
        <td>${escapeHtml(l.unit)}</td>
        <td>${escapeHtml(l.box_code)}</td>
        <td>${statusBadge(l.status)}</td>
        <td>
          <button class="btn btn-sm btn-warning" onclick="editLot('${escapeAttr(l.lot_id)}')">แก้ไข</button>
          <button class="btn btn-sm btn-danger" onclick="inactiveLot('${escapeAttr(l.lot_id)}')">ปิด</button>
        </td>
      </tr>
    `;
  });

  if (dataTable) dataTable.destroy();

  dataTable = new DataTable('#lotsTable', {
    language: dataTableThai(),
    pageLength: 25
  });
}

function editLot(lotId) {
  const l = lots.find(x => x.lot_id === lotId);
  if (!l) return;

  document.getElementById('lot_id').value = l.lot_id || '';
  document.getElementById('medicine_id').value = l.medicine_id || '';
  document.getElementById('lot_no').value = l.lot_no || '';
  document.getElementById('mfg_date').value = formatInputDate(l.mfg_date);
  document.getElementById('exp_date').value = formatInputDate(l.exp_date);
  document.getElementById('receive_qty').value = l.receive_qty || 0;
  document.getElementById('current_qty').value = l.current_qty || 0;
  document.getElementById('unit').value = l.unit || '';
  document.getElementById('location').value = l.location || '';
  renderBoxSelect(l.box_code || '');
  renderMedicineSelect(l.medicine_id || '');
  document.getElementById('status').value = l.status || 'active';
  document.getElementById('note').value = l.note || '';

  window.scrollTo({ top:0, behavior:'smooth' });
}

async function inactiveLot(lotId) {
  const confirm = await Swal.fire({
    icon:'warning',
    title:'ยืนยันการปิดใช้งาน',
    text:'ต้องการปิดใช้งาน Lot นี้ใช่หรือไม่',
    showCancelButton:true,
    confirmButtonText:'ยืนยัน',
    cancelButtonText:'ยกเลิก'
  });

  if (!confirm.isConfirmed) return;

  const data = {
    action:'deleteStockLot',
    token:getToken(),
    user:user,
    lot_id:lotId
  };

  const params = new URLSearchParams();
  params.append('data', JSON.stringify(data));

  try {
    const res = await fetch(API_URL, { method:'POST', body:params });
    const result = await res.json();

    if (result.success) {
      Swal.fire('สำเร็จ', result.message, 'success');
      loadLots();
    } else {
      Swal.fire('ไม่สำเร็จ', result.message, 'error');
    }
  } catch (error) {
    Swal.fire('เชื่อมต่อไม่ได้', 'กรุณาตรวจสอบ API', 'error');
  }
}

function resetForm() {
  document.getElementById('lotForm').reset();
  document.getElementById('lot_id').value = '';
  document.getElementById('unit').value = '';
  document.getElementById('status').value = 'active';
  renderBoxSelect();
}

function getMedicineName(id) {
  const m = medicines.find(x => x.medicine_id === id);
  return m ? `${m.medicine_name} ${m.strength}` : id;
}

function getSelectedDepartmentId() {
  const select = document.getElementById('location');
  const selectedOption = select.options[select.selectedIndex];
  if (selectedOption && selectedOption.dataset.departmentId) {
    return selectedOption.dataset.departmentId;
  }

  const department = departments.find(d => d.department_name === select.value || sameId(d.department_id, select.value));
  return department ? department.department_id : '';
}

function getSelectedBox() {
  const boxCode = document.getElementById('box_code').value;
  return departmentBoxes.find(box => sameId(box.box_code, boxCode)) || null;
}

function sameId(a, b) {
  return String(a ?? '') === String(b ?? '');
}

function qtyBadge(qty) {
  const q = Number(qty || 0);
  if (q <= 0) return `<span class="badge bg-danger">${q}</span>`;
  if (q <= 2) return `<span class="badge bg-warning text-dark">${q}</span>`;
  return `<span class="badge bg-success">${q}</span>`;
}

function expBadge(value) {
  if (!value) return '-';

  const today = new Date();
  const exp = new Date(value);
  const diffDays = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));

  if (diffDays < 0) {
    return `<span class="badge bg-danger">${escapeHtml(value)} หมดอายุ</span>`;
  }

  if (diffDays <= 90) {
    return `<span class="badge bg-warning text-dark">${escapeHtml(value)} ใกล้หมดอายุ</span>`;
  }

  return `<span class="badge bg-success">${escapeHtml(value)}</span>`;
}

function statusBadge(status) {
  const map = {
    active: 'bg-success',
    inactive: 'bg-secondary',
    expired: 'bg-danger',
    used_out: 'bg-dark'
  };
  return `<span class="badge ${map[status] || 'bg-secondary'}">${escapeHtml(status)}</span>`;
}

function formatInputDate(value) {
  if (!value) return '';
  const d = new Date(value);
  if (isNaN(d.getTime())) return value;
  return d.toISOString().slice(0, 10);
}

function dataTableThai() {
  return {
    search:'ค้นหา:',
    lengthMenu:'แสดง _MENU_ รายการ',
    info:'แสดง _START_ ถึง _END_ จาก _TOTAL_ รายการ',
    paginate:{ first:'แรก', last:'สุดท้าย', next:'ถัดไป', previous:'ก่อนหน้า' },
    zeroRecords:'ไม่พบข้อมูล'
  };
}

function escapeHtml(text) {
  if (text === null || text === undefined) return '';
  return String(text)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}

function escapeAttr(text) {
  return escapeHtml(text).replaceAll('`','&#096;');
}
</script>

</body>
</html>
