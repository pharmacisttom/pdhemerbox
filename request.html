<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>เบิก/บันทึกการใช้กล่องยา | Emergency MedBox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: #eef7f5;
        }
        
        .topbar {
            background: linear-gradient(135deg, #0d6efd, #198754);
            color: white;
            padding: 26px;
            border-radius: 0 0 28px 28px;
        }
        
        .card-custom {
            border: none;
            border-radius: 22px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, .08);
        }
        
        .form-control,
        .form-select {
            border-radius: 14px;
            padding: 12px;
        }
        
        .btn-main {
            border-radius: 16px;
            padding: 12px;
            font-weight: 700;
        }
        
        .qr-alert {
            border-radius: 18px;
            background: #d1fae5;
            border: 1px solid #86efac;
            color: #065f46;
            padding: 14px 18px;
            font-weight: 700;
            display: none;
        }
    </style>
</head>

<body>

    <div class="topbar mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <h4 class="fw-bold mb-1">เบิก / บันทึกการใช้กล่องยา</h4>
                <div>ระบบควบคุมกล่องยาฉุกเฉินช่วยชีวิต</div>
                <div class="small">ห้องยา โรงพยาบาลปลวกแดง</div>
            </div>

            <a href="dashboard.html" class="btn btn-light rounded-pill">
      กลับหน้าหลัก
    </a>
        </div>
    </div>

    <div class="container mb-5">

        <div id="qrAlert" class="qr-alert mb-3">
            สแกน QR Code สำเร็จ: <span id="qrBoxText"></span>
        </div>

        <div class="card card-custom">
            <div class="card-body p-4">

                <form id="requestForm">

                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label">หน่วยงาน</label>
                            <select id="department_id" class="form-select" required>
              <option value="">-- เลือกหน่วยงาน --</option>
            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">รหัสกล่องยา</label>
                            <input type="text" id="box_code" class="form-control" placeholder="เช่น ER-BOX-01" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">วันเวลาที่ใช้ยา</label>
                            <input type="datetime-local" id="usage_datetime" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">เบอร์โทรติดต่อ</label>
                            <input type="tel" id="phone" class="form-control" placeholder="เบอร์โทรผู้บันทึก">
                        </div>

                        <div class="col-12">
                            <label class="form-label">เหตุผลการใช้</label>
                            <textarea id="reason" class="form-control" rows="2" required placeholder="เช่น CPR, Anaphylaxis, Shock"></textarea>
                        </div>

                        <div class="col-12">
                            <hr>
                            <h5 class="fw-bold text-primary">รายการยาที่ใช้</h5>
                        </div>

                        <div class="col-md-5">
                            <label class="form-label">รายการยา</label>
                            <select id="medicine_id" class="form-select">
              <option value="">-- เลือกรายการยา --</option>
            </select>
                        </div>

                        <div class="col-md-2">
                            <label class="form-label">จำนวน</label>
                            <input type="number" id="qty" class="form-control" min="1">
                        </div>

                        <div class="col-md-2">
                            <label class="form-label">หน่วย</label>
                            <input type="text" id="unit" class="form-control" readonly>
                        </div>

                        <div class="col-md-3 d-flex align-items-end">
                            <button type="button" class="btn btn-primary w-100 btn-main" onclick="addItem()">
              เพิ่มรายการ
            </button>
                        </div>

                        <div class="col-12">
                            <div class="table-responsive">
                                <table class="table table-bordered align-middle">
                                    <thead class="table-primary">
                                        <tr>
                                            <th>รายการยา</th>
                                            <th width="120">จำนวน</th>
                                            <th width="100">หน่วย</th>
                                            <th width="80">ลบ</th>
                                        </tr>
                                    </thead>
                                    <tbody id="itemTable">
                                        <tr>
                                            <td colspan="4" class="text-center text-muted">ยังไม่มีรายการยา</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label">แนบรูปภาพกล่องยา / รายการยา</label>
                            <input type="file" id="photo" class="form-control" accept="image/*">
                            <div class="form-text">รองรับรูปภาพไม่เกิน 5 MB</div>
                        </div>

                        <div class="col-12">
                            <label class="form-label">หมายเหตุ</label>
                            <textarea id="note" class="form-control" rows="2"></textarea>
                        </div>

                        <div class="col-12">
                            <button type="submit" id="btnSubmit" class="btn btn-success w-100 btn-main">
              ส่งข้อมูลการเบิก / ใช้กล่องยา
            </button>
                        </div>

                    </div>

                </form>

            </div>
        </div>

    </div>

    <script src="assets/js/config.js?v=40"></script>
    <script src="assets/js/auth.js?v=40"></script>

    <script>
        requireLogin();

        const user = getUser();

        let medicines = [];
        let departments = [];
        let requestItems = [];

        document.addEventListener('DOMContentLoaded', async function() {
            document.getElementById('usage_datetime').value = getLocalDateTime();
            await loadMasterData();
            applyQRCodeBox();
        });

        async function loadMasterData() {
            try {
                Swal.fire({
                    title: 'กำลังโหลดข้อมูล',
                    allowOutsideClick: false,
                    didOpen: () => Swal.showLoading()
                });

                const res = await fetch(API_URL + '?action=masterData');
                const result = await res.json();

                Swal.close();

                if (!result.success) {
                    Swal.fire('ผิดพลาด', result.message, 'error');
                    return;
                }

                medicines = result.medicines || [];
                departments = result.departments || [];

                renderDepartments();
                renderMedicines();

            } catch (error) {
                console.error(error);
                Swal.fire('โหลดข้อมูลไม่สำเร็จ', 'กรุณาตรวจสอบ API หรือ Internet', 'error');
            }
        }

        function applyQRCodeBox() {
            const params = new URLSearchParams(window.location.search);
            const boxFromQr = params.get('box');

            if (!boxFromQr) return;

            document.getElementById('box_code').value = boxFromQr;
            document.getElementById('qrBoxText').innerText = boxFromQr;
            document.getElementById('qrAlert').style.display = 'block';
        }

        function renderDepartments() {
            const select = document.getElementById('department_id');
            select.innerHTML = '<option value="">-- เลือกหน่วยงาน --</option>';

            departments.forEach(d => {
                select.innerHTML += `
      <option value="${escapeHtml(d.department_id)}">
        ${escapeHtml(d.department_name)}
      </option>
    `;
            });

            if (user && user.department) {
                const found = departments.find(d =>
                    d.department_name === user.department ||
                    d.department_id === user.department
                );

                if (found) {
                    select.value = found.department_id;
                }
            }
        }

        function renderMedicines() {
            const select = document.getElementById('medicine_id');
            select.innerHTML = '<option value="">-- เลือกรายการยา --</option>';

            medicines.forEach(m => {
                const medText = `${m.medicine_name || ''} ${m.strength || ''}`;
                select.innerHTML += `
      <option value="${escapeHtml(m.medicine_id)}" data-unit="${escapeHtml(m.unit)}">
        ${escapeHtml(medText)}
      </option>
    `;
            });
        }

        document.getElementById('medicine_id').addEventListener('change', function() {
            const selected = this.options[this.selectedIndex];
            document.getElementById('unit').value = selected.getAttribute('data-unit') || '';
        });

        function addItem() {
            const medicineId = document.getElementById('medicine_id').value;
            const qty = document.getElementById('qty').value;
            const unit = document.getElementById('unit').value;

            if (!medicineId || !qty || Number(qty) <= 0) {
                Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกรายการยาและระบุจำนวนให้ถูกต้อง', 'warning');
                return;
            }

            const med = medicines.find(m => m.medicine_id === medicineId);

            if (!med) {
                Swal.fire('ไม่พบรายการยา', 'กรุณาเลือกรายการยาใหม่อีกครั้ง', 'warning');
                return;
            }

            const exists = requestItems.find(item => item.medicine_id === medicineId);

            if (exists) {
                exists.qty = Number(exists.qty) + Number(qty);
            } else {
                requestItems.push({
                    medicine_id: medicineId,
                    medicine_name: `${med.medicine_name || ''} ${med.strength || ''}`,
                    qty: Number(qty),
                    unit: unit
                });
            }

            document.getElementById('medicine_id').value = '';
            document.getElementById('qty').value = '';
            document.getElementById('unit').value = '';

            renderItems();
        }

        function renderItems() {
            const tbody = document.getElementById('itemTable');

            if (requestItems.length === 0) {
                tbody.innerHTML = `
      <tr>
        <td colspan="4" class="text-center text-muted">ยังไม่มีรายการยา</td>
      </tr>
    `;
                return;
            }

            tbody.innerHTML = '';

            requestItems.forEach((item, index) => {
                tbody.innerHTML += `
      <tr>
        <td>${escapeHtml(item.medicine_name)}</td>
        <td>${escapeHtml(item.qty)}</td>
        <td>${escapeHtml(item.unit)}</td>
        <td>
          <button type="button" class="btn btn-danger btn-sm" onclick="removeItem(${index})">
            ลบ
          </button>
        </td>
      </tr>
    `;
            });
        }

        function removeItem(index) {
            requestItems.splice(index, 1);
            renderItems();
        }

        document.getElementById('requestForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (requestItems.length === 0) {
                Swal.fire('ยังไม่มีรายการยา', 'กรุณาเพิ่มรายการยาที่ใช้ก่อนบันทึก', 'warning');
                return;
            }

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = 'กำลังบันทึก...';

            let photoBase64 = '';
            let photoName = '';

            try {
                const photoInput = document.getElementById('photo');

                if (photoInput.files.length > 0) {
                    const file = photoInput.files[0];

                    if (file.size > 5 * 1024 * 1024) {
                        Swal.fire('ไฟล์ใหญ่เกินไป', 'กรุณาเลือกรูปภาพไม่เกิน 5 MB', 'warning');
                        btn.disabled = false;
                        btn.innerText = 'ส่งข้อมูลการเบิก / ใช้กล่องยา';
                        return;
                    }

                    photoBase64 = await toBase64(file);
                    photoName = new Date().getTime() + '_' + file.name;
                }

                const data = {
                    action: 'createRequest',
                    token: getToken(),
                    user: user,
                    department_id: document.getElementById('department_id').value,
                    box_code: document.getElementById('box_code').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    usage_datetime: document.getElementById('usage_datetime').value,
                    reason: document.getElementById('reason').value.trim(),
                    note: document.getElementById('note').value.trim(),
                    photoBase64: photoBase64,
                    photoName: photoName,
                    items: requestItems
                };

                const params = new URLSearchParams();
                params.append('data', JSON.stringify(data));

                Swal.fire({
                    title: 'กำลังบันทึกข้อมูล',
                    text: 'ระบบกำลังตัด Stock และสร้างรายการเติมคืน',
                    allowOutsideClick: false,
                    didOpen: () => Swal.showLoading()
                });

                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: params
                });

                const result = await res.json();

                if (result.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'บันทึกสำเร็จ',
                        text: 'เลขที่รายการ: ' + result.request_id
                    }).then(() => {
                        window.location.href = 'dashboard.html';
                    });
                } else {
                    Swal.fire('บันทึกไม่สำเร็จ', result.message, 'error');
                }

            } catch (error) {
                console.error(error);
                Swal.fire('เชื่อมต่อไม่ได้', 'กรุณาตรวจสอบ Internet หรือ API URL', 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = 'ส่งข้อมูลการเบิก / ใช้กล่องยา';
            }
        });

        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();

                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function getLocalDateTime() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            return now.toISOString().slice(0, 16);
        }

        function escapeHtml(text) {
            if (text === null || text === undefined) return '';

            return String(text)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }
    </script>

</body>

</html>
