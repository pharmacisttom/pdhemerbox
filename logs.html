<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>System Logs | Emergency MedBox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Sarabun', sans-serif;
      background: #eef7f5;
    }

    .topbar {
      background: linear-gradient(135deg, #0d6efd, #198754);
      color: white;
      padding: 24px;
      border-radius: 0 0 28px 28px;
    }

    .card-custom {
      border: none;
      border-radius: 22px;
      box-shadow: 0 8px 25px rgba(0,0,0,.08);
    }

    .badge {
      border-radius: 20px;
      padding: 8px 12px;
    }
  </style>
</head>

<body>

<div class="topbar mb-4">
  <div class="container d-flex justify-content-between align-items-center">
    <div>
      <h4 class="fw-bold mb-1">System Logs</h4>
      <div>ประวัติการใช้งานระบบกล่องยาฉุกเฉิน</div>
    </div>
    <a href="dashboard.html" class="btn btn-light rounded-pill">กลับหน้าหลัก</a>
  </div>
</div>

<div class="container mb-5">

  <div class="card card-custom mb-4">
    <div class="card-body p-4">

      <div class="row g-3 align-items-end">

        <div class="col-md-3">
          <label class="form-label">Action</label>
          <input type="text" id="filterAction" class="form-control" placeholder="เช่น login, create_request">
        </div>

        <div class="col-md-3">
          <label class="form-label">Username</label>
          <input type="text" id="filterUsername" class="form-control" placeholder="ค้นหาผู้ใช้">
        </div>

        <div class="col-md-3">
          <label class="form-label">Module</label>
          <input type="text" id="filterModule" class="form-control" placeholder="เช่น auth, requests">
        </div>

        <div class="col-md-3 d-flex gap-2">
          <button class="btn btn-primary w-100" onclick="applyFilter()">ค้นหา</button>
          <button class="btn btn-secondary w-100" onclick="clearFilter()">ล้าง</button>
        </div>

      </div>

    </div>
  </div>

  <div class="card card-custom">
    <div class="card-body p-4">

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold text-primary mb-0">ประวัติการใช้งานระบบ</h5>
        <button class="btn btn-outline-primary rounded-pill" onclick="loadLogs()">รีเฟรช</button>
      </div>

      <div class="table-responsive">
        <table id="logsTable" class="table table-hover align-middle w-100">
          <thead class="table-primary">
            <tr>
              <th>เวลา</th>
              <th>User ID</th>
              <th>Username</th>
              <th>Role</th>
              <th>Action</th>
              <th>Module</th>
              <th>Detail</th>
              <th>IP</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

    </div>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.min.js"></script>

<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>

<script>
requireLogin();
requireRole(['admin']);

let logs = [];
let dataTable = null;

document.addEventListener('DOMContentLoaded', loadLogs);

async function loadLogs() {
  try {
    Swal.fire({
      title: 'กำลังโหลดข้อมูล',
      allowOutsideClick: false,
      didOpen: () => Swal.showLoading()
    });

    const res = await fetch(API_URL + '?action=getLogs&token=' + encodeURIComponent(getToken()));
    const result = await res.json();

    Swal.close();

    if (!result.success) {
      Swal.fire('ผิดพลาด', result.message, 'error');
      return;
    }

    logs = result.logs || [];
    renderLogs(logs);

  } catch (error) {
    Swal.fire('โหลดข้อมูลไม่สำเร็จ', 'กรุณาตรวจสอบ API', 'error');
  }
}

function renderLogs(data) {
  const tbody = document.querySelector('#logsTable tbody');
  tbody.innerHTML = '';

  data.slice().reverse().forEach(log => {
    tbody.innerHTML += `
      <tr>
        <td>${formatDate(log.timestamp)}</td>
        <td>${escapeHtml(log.user_id)}</td>
        <td>${escapeHtml(log.username)}</td>
        <td>${escapeHtml(log.role)}</td>
        <td>${actionBadge(log.action)}</td>
        <td>${escapeHtml(log.module)}</td>
        <td>${escapeHtml(log.detail)}</td>
        <td>${escapeHtml(log.ip_address)}</td>
      </tr>
    `;
  });

  if (dataTable) dataTable.destroy();

  dataTable = new DataTable('#logsTable', {
    language: dataTableThai(),
    pageLength: 25,
    order: []
  });
}

function applyFilter() {
  const action = document.getElementById('filterAction').value.trim().toLowerCase();
  const username = document.getElementById('filterUsername').value.trim().toLowerCase();
  const module = document.getElementById('filterModule').value.trim().toLowerCase();

  const filtered = logs.filter(log => {
    const matchAction = !action || String(log.action || '').toLowerCase().includes(action);
    const matchUsername = !username || String(log.username || '').toLowerCase().includes(username);
    const matchModule = !module || String(log.module || '').toLowerCase().includes(module);
    return matchAction && matchUsername && matchModule;
  });

  renderLogs(filtered);
}

function clearFilter() {
  document.getElementById('filterAction').value = '';
  document.getElementById('filterUsername').value = '';
  document.getElementById('filterModule').value = '';
  renderLogs(logs);
}

function actionBadge(action) {
  const colorMap = {
    login: 'bg-success',
    logout: 'bg-secondary',
    login_failed: 'bg-danger',
    register: 'bg-info text-dark',
    create_request: 'bg-primary',
    update_request_status: 'bg-warning text-dark',
    save_medicine: 'bg-success',
    delete_medicine: 'bg-danger',
    update_user: 'bg-warning text-dark'
  };

  return `<span class="badge ${colorMap[action] || 'bg-dark'}">${escapeHtml(action)}</span>`;
}

function formatDate(value) {
  if (!value) return '-';
  const d = new Date(value);
  if (isNaN(d.getTime())) return escapeHtml(value);
  return d.toLocaleString('th-TH');
}

function dataTableThai() {
  return {
    search: 'ค้นหา:',
    lengthMenu: 'แสดง _MENU_ รายการ',
    info: 'แสดง _START_ ถึง _END_ จาก _TOTAL_ รายการ',
    paginate: {
      first: 'แรก',
      last: 'สุดท้าย',
      next: 'ถัดไป',
      previous: 'ก่อนหน้า'
    },
    zeroRecords: 'ไม่พบข้อมูล'
  };
}

function escapeHtml(text) {
  if (!text) return '';
  return String(text)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}
</script>

</body>
</html>
